# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  primary: &primary_development
    <<: *default
    <% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
    <% else %>
    database: <%= ENV.fetch("DATABASE_NAME") { "grenoble_roller_development" } %>
    username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") { "postgres" } %>
    host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    <% end %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary: &primary_test
    <<: *default
    <% if ENV["TEST_DATABASE_URL"] %>
    url: <%= ENV["TEST_DATABASE_URL"] %>
    <% else %>
    database: <%= ENV.fetch("TEST_DATABASE_NAME") { "grenoble_roller_test" } %>
    username: <%= ENV.fetch("DATABASE_USER") { ENV.fetch("TEST_DATABASE_USER") { "postgres" } } %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") { ENV.fetch("TEST_DATABASE_PASSWORD") { "postgres" } } %>
    host: <%= ENV.fetch("DATABASE_HOST") { ENV.fetch("TEST_DATABASE_HOST") { "localhost" } } %>
    port: <%= ENV.fetch("DATABASE_PORT") { ENV.fetch("TEST_DATABASE_PORT") { 5432 } } %>
    <% end %>

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  primary: &primary_production
    <<: *default
    <% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
    <% else %>
    database: <%= ENV.fetch("DATABASE_NAME") { "app_production" } %>
    username: <%= ENV.fetch("DATABASE_USER") { "app" } %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") { ENV["APP_DATABASE_PASSWORD"] } %>
    host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    <% end %>
  queue:
    <<: *primary_production
  cache:
    <<: *primary_production
    database: app_production_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_production
    database: app_production_cable
    migrations_paths: db/cable_migrate

# Staging : préférer RAILS_ENV=staging (voir config/environments/staging.rb, HelloAsso sandbox)
staging:
  primary: &primary_staging
    <<: *default
    <% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
    <% else %>
    database: <%= ENV.fetch("DATABASE_NAME") { "app_production" } %>
    username: <%= ENV.fetch("DATABASE_USER") { "app" } %>
    password: <%= ENV.fetch("DATABASE_PASSWORD") { ENV["APP_DATABASE_PASSWORD"] } %>
    host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    <% end %>
  queue:
    <<: *primary_staging
  cache:
    <<: *primary_staging
    database: app_production_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_staging
    database: app_production_cable
    migrations_paths: db/cable_migrate
